{% extends "base.html" %}
{% block title %}Transactions - SunPass{% endblock %}
{% block content %}
<h4 class="mb-3">Transactions</h4>

<div class="filter-bar">
    <form id="filter-form" hx-get="/fragments/transaction-table" hx-target="#transaction-table-container" hx-trigger="change" hx-include="[name]">
        <div class="row g-3 align-items-end">
            <div class="col-md-2">
                <label class="form-label">From Date</label>
                <input type="date" class="form-control" name="start_date" value="{{ start_date or '' }}">
            </div>
            <div class="col-md-2">
                <label class="form-label">To Date</label>
                <input type="date" class="form-control" name="end_date" value="{{ end_date or '' }}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Vehicle</label>
                <select class="form-select" name="vehicle_id">
                    <option value="">All Vehicles</option>
                    {% for v in filters.vehicles %}
                    <option value="{{ v }}" {% if vehicle_id == v %}selected{% endif %}>{{ v }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Transponder</label>
                <select class="form-select" name="transponder_id">
                    <option value="">All Transponders</option>
                    {% for t in filters.transponders %}
                    <option value="{{ t }}" {% if transponder_id == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Road/Plaza</label>
                <select class="form-select" name="plaza_name">
                    <option value="">All Roads</option>
                    {% for p in filters.plazas %}
                    <option value="{{ p }}" {% if plaza_name == p %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <a href="/transactions/export?{{ request.query_string.decode() }}" class="btn btn-outline-secondary w-100">Export CSV</a>
            </div>
        </div>
    </form>
</div>

<div id="transaction-table-container">
    {% include "fragments/transaction_table.html" %}
</div>
{% endblock %}
